# Reference: https://openupm.com/docs/adding-upm-package.html

name: com.roslyn-repl
displayName: Roslyn REPL
repoUrl: https://github.com/djdcks12/ROSLYN-REPL
parentRepoUrl: ""
description: |
  Editor-only C# REPL for Unity, powered by Roslyn. Compile and execute
  arbitrary C# at runtime, inspect any MonoBehaviour / ScriptableObject /
  singleton in memory, watch expressions live, save named snippets, and
  review run history — all from a UI Toolkit window inside the Editor.
  Zero project dependencies.
